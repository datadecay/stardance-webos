<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slot Machine</title>
<style>
.slot {
  width: 50px;
  height: 250px;
  position: absolute;
  top: 0px;
  background: linear-gradient(to bottom, 
    #ff3232 0px, #ff3232 50px, 
    #ffff00 50px, #ffff00 100px, 
    #00ffff 100px, #00ffff 150px, 
    #00ff00 150px, #00ff00 200px, 
    #ff00ff 200px, #ff00ff 250px
  );
  background-size: 50px 250px;
  background-repeat: repeat-y;
}
#slot1 { left: 0px; }
#slot2 { left: 50px; }
#slot3 { left: 100px; }
#slot4 { left: 150px; }
#slot5 { left: 200px; }
#slot6 { left: 250px; }
#slot7 { left: 300px; }

#topBlocker {
  top: 0px;
  width: 350px;
  height: 100px;
  position: absolute;
  background-color: black;
  left: 0px;
  z-index: 10;
}
#bottomBlocker {
  top: 150px;
  width: 350px;
  height: 100px;
  position: absolute;
  background-color: black;
  left: 0px;
  z-index: 10;
}
.blocker {
/*display: none;
*/}

#roll {
  position: absolute;
  top: 260px;
  left: 0px;
}
#autoRoll {
  position: absolute;
  top: 260px;
  left: 0px;
}
</style>
</head>
<body>

<div id="slot1" class="slot"></div>
<div id="slot2" class="slot"></div>
<div id="slot3" class="slot"></div>
<div id="slot4" class="slot"></div>
<div id="slot5" class="slot"></div>
<div id="slot6" class="slot"></div>
<div id="slot7" class="slot"></div>
<div id="topBlocker" class="blocker"></div>
<div id="bottomBlocker" class="blocker"></div>
<button id="autoRoll">Spin Until Win!</button>

<script>
const ROW_HEIGHT = 50; 
const TOTAL_ROWS = 5;  

const slots = [
  document.getElementById('slot1'),
  document.getElementById('slot2'),
  document.getElementById('slot3'),
  document.getElementById('slot4'),
  document.getElementById('slot5'),
  document.getElementById('slot6'),
  document.getElementById('slot7')

];
const autoRollButton = document.getElementById('autoRoll');

let currentPositions = [0, 0, 0, 0, 0, 0, 0];
let isAutoSpinning = false;
let audioContext = null;

function playClick() {
//I stole this from somewhere lol
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioContext.state === 'suspended') {
    audioContext.resume();
  }
  
  const oscillator = audioContext.createOscillator();
  const gain = audioContext.createGain();

  oscillator.type = 'sine';
  oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
  
  gain.gain.setValueAtTime(1, audioContext.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.1);
  
  oscillator.connect(gain);
  gain.connect(audioContext.destination);
  
  oscillator.start();
  oscillator.stop(audioContext.currentTime + 0.1);
}

function startAudio() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function spin() {
  autoRollButton.disabled = true;
  
  const results = [];

  slots.forEach((slot, index) => {
    const randomRow = Math.floor(Math.random() * TOTAL_ROWS);
    results.push(randomRow);

    let rowsToMove = randomRow - (currentPositions[index] % TOTAL_ROWS);
    if (rowsToMove <= 0) {
      rowsToMove += TOTAL_ROWS; 
    }

    const extraSpins = (3 + index) * TOTAL_ROWS; 
    
    let basePosition = currentPositions[index];
    const targetRows = rowsToMove + extraSpins;
    currentPositions[index] += targetRows;

    let totalDurationMs = (1 + index * 0.4) * 1000;
    let timePerBlock = totalDurationMs / targetRows;

    for (let i = 1; i <= targetRows; i++) {
      setTimeout(() => {
        playClick();
      }, i * timePerBlock);
    }

    const targetY = -(currentPositions[index] * ROW_HEIGHT) + 100;

    slot.style.transition = `background-position-y ${1 + index * 0.4}s ease-out`;
    slot.style.backgroundPositionY = `${targetY}px`;
  });

  const totalDuration = (1 + (slots.length - 1) * 0.4) * 1000;
  
  setTimeout(() => {
    const isWin = results.every(val => val === results[0]);
    
    if (isWin) {
      alert('you win!');
      autoRollButton.disabled = false;
      isAutoSpinning = false;
    } else {
      if (isAutoSpinning) {
        setTimeout(spin, 200); 
      } else {
        autoRollButton.disabled = false;
      }
    }
  }, totalDuration);
}

autoRollButton.addEventListener('click', () => {
  startAudio();
  isAutoSpinning = true;
  spin();
});
</script>

</body>
</html>
